name: Cypress Report Pages
run-name: Report #${{ github.run_number }} | ${{ inputs.spec_path }}

on:
  workflow_dispatch:
    inputs:
      spec_path:
        description: Cypress spec path to run
        required: true
        default: cypress/e2e/features/common/login.cy.js
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress and generate HTML report
        id: cypress
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: npm run test:report -- --spec ${{ inputs.spec_path }}

      - name: Build landing page
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path reports/latest -Force | Out-Null

          $indexPath = "reports/latest/index.html"
          $reportPath = "reports/latest/report.html"
          $status = "${{ steps.cypress.outcome }}"
          $repo = "${{ github.repository }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $sha = "${{ github.sha }}"
          $shortSha = $sha.Substring(0, 7)
          $refName = "${{ github.ref_name }}"
          $runNumber = "${{ github.run_number }}"
          $runAttempt = "${{ github.run_attempt }}"
          $specPath = "${{ inputs.spec_path }}"
          $generatedAtUtc = (Get-Date).ToUniversalTime()
          $taipeiTz = [System.TimeZoneInfo]::FindSystemTimeZoneById('Asia/Taipei')
          $generatedAt = [System.TimeZoneInfo]::ConvertTimeFromUtc($generatedAtUtc, $taipeiTz).ToString("yyyy/MM/dd HH:mm:ss '(UTC+8)'")
          $reportExists = Test-Path $reportPath
          $pageTitle = "WETPAINT Cypress Report - $generatedAt"

          $statusLabel = if ($status -eq 'success') { 'Success' } else { 'Failed' }
          $statusClass = if ($status -eq 'success') { 'success' } else { 'failed' }
          $reportSummary = if ($reportExists) { 'HTML report is available for this run.' } else { 'HTML report was not generated for this run.' }
          $reportLink = if ($reportExists) {
            '<a class="primary" href="./report.html">Open HTML report</a>'
          } else {
            '<span class="disabled">HTML report unavailable</span>'
          }

          $landingHtml = @(
            '<!doctype html>',
            '<html lang="en">',
            '<head>',
            '  <meta charset="utf-8">',
            '  <meta name="viewport" content="width=device-width, initial-scale=1">',
            "  <title>$pageTitle</title>",
            '  <style>',
            '    :root {',
            '      color-scheme: light;',
            '      --bg: #f4f1ea;',
            '      --card: #fffdf8;',
            '      --text: #1f1a17;',
            '      --muted: #6b625b;',
            '      --accent: #b84c2a;',
            '      --accent-soft: #fbe3d8;',
            '      --ok: #1f7a4d;',
            '      --ok-soft: #dff3e8;',
            '      --border: #dfd6cb;',
            '    }',
            '    * { box-sizing: border-box; }',
            '    body {',
            '      margin: 0;',
            '      font-family: Georgia, "Times New Roman", serif;',
            '      background:',
            '        radial-gradient(circle at top right, #f6d9bc 0, transparent 30%),',
            '        linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);',
            '      color: var(--text);',
            '    }',
            '    main {',
            '      max-width: 860px;',
            '      margin: 48px auto;',
            '      padding: 0 20px 40px;',
            '    }',
            '    .card {',
            '      background: var(--card);',
            '      border: 1px solid var(--border);',
            '      border-radius: 18px;',
            '      padding: 28px;',
            '      box-shadow: 0 16px 48px rgba(31, 26, 23, 0.08);',
            '    }',
            '    h1 {',
            '      margin: 0 0 12px;',
            '      font-size: 2rem;',
            '    }',
            '    p, li {',
            '      line-height: 1.6;',
            '    }',
            '    .muted {',
            '      color: var(--muted);',
            '    }',
            '    .status {',
            '      display: inline-block;',
            '      padding: 6px 10px;',
            '      border-radius: 999px;',
            '      font-weight: 700;',
            '      margin-bottom: 18px;',
            '    }',
            '    .status.success {',
            '      background: var(--ok-soft);',
            '      color: var(--ok);',
            '    }',
            '    .status.failed {',
            '      background: var(--accent-soft);',
            '      color: var(--accent);',
            '    }',
            '    .grid {',
            '      display: grid;',
            '      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));',
            '      gap: 12px;',
            '      margin: 24px 0;',
            '    }',
            '    .item {',
            '      border: 1px solid var(--border);',
            '      border-radius: 14px;',
            '      padding: 14px 16px;',
            '      background: rgba(255,255,255,0.55);',
            '    }',
            '    .item strong {',
            '      display: block;',
            '      margin-bottom: 6px;',
            '      font-size: 0.95rem;',
            '    }',
            '    .actions {',
            '      display: flex;',
            '      flex-wrap: wrap;',
            '      gap: 12px;',
            '      margin-top: 20px;',
            '    }',
            '    a.primary, a.secondary, .disabled {',
            '      display: inline-flex;',
            '      align-items: center;',
            '      justify-content: center;',
            '      min-height: 42px;',
            '      padding: 0 16px;',
            '      border-radius: 999px;',
            '      text-decoration: none;',
            '      border: 1px solid transparent;',
            '      font-weight: 700;',
            '    }',
            '    a.primary {',
            '      background: var(--accent);',
            '      color: white;',
            '    }',
            '    a.secondary {',
            '      background: transparent;',
            '      color: var(--accent);',
            '      border-color: var(--border);',
            '    }',
            '    .disabled {',
            '      background: #eee7de;',
            '      color: var(--muted);',
            '      border-color: var(--border);',
            '    }',
            '    code {',
            '      background: #f3ece4;',
            '      padding: 2px 6px;',
            '      border-radius: 6px;',
            '      overflow-wrap: anywhere;',
            '    }',
            '  </style>',
            '</head>',
            '<body>',
            '  <main>',
            '    <section class="card">',
            "      <div class=""status $statusClass"">$statusLabel</div>",
            "      <h1>$pageTitle</h1>",
            "      <p class=""muted"">$reportSummary</p>",
            '      <div class="grid">',
            "        <div class=""item""><strong>Spec</strong><code>$specPath</code></div>",
            "        <div class=""item""><strong>Generated At</strong>$generatedAt</div>",
            "        <div class=""item""><strong>Repository</strong>$repo</div>",
            "        <div class=""item""><strong>Branch</strong>$refName</div>",
            "        <div class=""item""><strong>Commit</strong><code>$shortSha</code></div>",
            "        <div class=""item""><strong>Run</strong>#$runNumber (attempt $runAttempt)</div>",
            '      </div>',
            '      <div class="actions">',
            "        $reportLink",
            "        <a class=""secondary"" href=""$runUrl"">Open workflow run</a>",
            '      </div>',
            '    </section>',
            '  </main>',
            '</body>',
            '</html>'
          ) -join "`n"

          $landingHtml | Set-Content -Path $indexPath -Encoding UTF8
          New-Item -ItemType File -Path "reports/latest/.nojekyll" -Force | Out-Null

      - name: Upload raw report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            reports/latest
            cypress/screenshots
            cypress/videos

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: reports/latest

  deploy:
    if: always()
    needs: build-report
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
