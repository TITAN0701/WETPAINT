name: Cypress Report Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress and generate HTML report
        id: cypress
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: npm run test:report

      - name: Ensure Pages payload exists
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path reports/latest -Force | Out-Null

          $reportPath = "reports/latest/index.html"
          if (-not (Test-Path $reportPath)) {
            $status = "${{ steps.cypress.outcome }}"
            $repo = "${{ github.repository }}"
            $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            $sha = "${{ github.sha }}"
            $refName = "${{ github.ref_name }}"

            @"
            <!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>WETPAINT Cypress Report</title>
              <style>
                :root {
                  color-scheme: light;
                  --bg: #f4f1ea;
                  --card: #fffdf8;
                  --text: #1f1a17;
                  --muted: #6b625b;
                  --accent: #b84c2a;
                  --border: #dfd6cb;
                }
                * { box-sizing: border-box; }
                body {
                  margin: 0;
                  font-family: Georgia, "Times New Roman", serif;
                  background:
                    radial-gradient(circle at top right, #f6d9bc 0, transparent 30%),
                    linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
                  color: var(--text);
                }
                main {
                  max-width: 760px;
                  margin: 48px auto;
                  padding: 0 20px;
                }
                .card {
                  background: var(--card);
                  border: 1px solid var(--border);
                  border-radius: 18px;
                  padding: 28px;
                  box-shadow: 0 16px 48px rgba(31, 26, 23, 0.08);
                }
                h1 {
                  margin-top: 0;
                  margin-bottom: 12px;
                  font-size: 2rem;
                }
                p, li {
                  line-height: 1.6;
                }
                .meta {
                  color: var(--muted);
                  margin-bottom: 20px;
                }
                .status {
                  display: inline-block;
                  padding: 6px 10px;
                  border-radius: 999px;
                  background: #fbe3d8;
                  color: var(--accent);
                  font-weight: 700;
                  margin-bottom: 18px;
                }
                a {
                  color: var(--accent);
                }
                code {
                  background: #f3ece4;
                  padding: 2px 6px;
                  border-radius: 6px;
                }
              </style>
            </head>
            <body>
              <main>
                <section class="card">
                  <div class="status">Report not generated</div>
                  <h1>WETPAINT Cypress Report</h1>
                  <p class="meta">Repository: $repo<br>Branch: $refName<br>Commit: $sha</p>
                  <p>The workflow completed without producing <code>reports/latest/index.html</code>.</p>
                  <p>This fallback page was published so the latest GitHub Pages URL still stays readable.</p>
                  <ul>
                    <li>Cypress step outcome: <strong>$status</strong></li>
                    <li>Open the workflow run for logs and screenshots: <a href="$runUrl">$runUrl</a></li>
                  </ul>
                </section>
              </main>
            </body>
            </html>
            "@ | Set-Content -Path $reportPath -Encoding UTF8
          }

          New-Item -ItemType File -Path "reports/latest/.nojekyll" -Force | Out-Null

      - name: Upload raw report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            reports/latest
            cypress/screenshots
            cypress/videos

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: reports/latest

  deploy:
    if: always()
    needs: build-report
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
