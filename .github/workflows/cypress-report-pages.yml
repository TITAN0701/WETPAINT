name: Cypress Report
run-name: Cypress Report #${{ github.run_number }} | ${{ inputs.spec_path }}

on:
  workflow_dispatch:
    inputs:
      spec_path:
        description: Cypress spec path to run
        required: true
        default: cypress/e2e/features/common/login.cy.js
        type: string

permissions:
  contents: read

concurrency:
  group: cypress-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress
        id: cypress
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_MAILSLURP_REGISTER_API_KEY: ${{ secrets.MAILSLURP_REGISTER_API_KEY }}
          CYPRESS_MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
          CYPRESS_MAILSLURP_TEST_API_KEY: ${{ secrets.MAILSLURP_TEST_API_KEY }}
        with:
          install: false
          command: npm run test:report -- --spec ${{ inputs.spec_path }}

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            reports/latest
            cypress/screenshots
            cypress/videos

      - name: Write run summary
        if: always()
        shell: pwsh
        run: |
          $summary = @(
            "## Cypress Report"
            ""
            "- Branch: `${{ github.ref_name }}`"
            "- Commit: `${{ github.sha }}`"
            "- Spec: `${{ inputs.spec_path }}`"
            "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            "- Artifact: `cypress-report-${{ github.run_number }}`"
            ""
            "Download the artifact from this workflow run to inspect the HTML report, screenshots, and videos."
          ) -join "`n"

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
