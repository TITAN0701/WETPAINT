name: Cypress Report
run-name: Cypress Report #${{ github.run_number }} | ${{ inputs.spec_path }}

on:
  workflow_dispatch:
    inputs:
      spec_path:
        description: Cypress spec path to run
        required: true
        default: cypress/e2e/features/common/login.cy.js
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cypress-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress
        id: cypress
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_MAILSLURP_REGISTER_API_KEY: ${{ secrets.MAILSLURP_REGISTER_API_KEY }}
          CYPRESS_MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
          CYPRESS_MAILSLURP_TEST_API_KEY: ${{ secrets.MAILSLURP_TEST_API_KEY }}
        with:
          install: false
          command: npm run test:report -- --spec ${{ inputs.spec_path }}

      - name: Prepare Pages site
        if: always()
        shell: pwsh
        run: |
          $reportRoot = Join-Path $PWD 'reports/latest'
          $reportFile = Join-Path $reportRoot 'report.html'
          $indexFile = Join-Path $reportRoot 'index.html'

          if (-not (Test-Path $reportFile)) {
            New-Item -ItemType Directory -Force -Path $reportRoot | Out-Null
            @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Cypress report unavailable</title>
          </head>
          <body>
            <h1>Cypress report unavailable</h1>
            <p>The workflow did not generate <code>reports/latest/report.html</code>.</p>
            <p>Check the workflow logs for the Cypress run details.</p>
          </body>
          </html>
          "@ | Set-Content -Path $indexFile -Encoding utf8
            exit 0
          }

          @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./report.html">
            <title>Redirecting to Cypress report</title>
          </head>
          <body>
            <p>Redirecting to <a href="./report.html">report.html</a>...</p>
          </body>
          </html>
          "@ | Set-Content -Path $indexFile -Encoding utf8

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/latest

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-debug-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            cypress/screenshots
            cypress/videos

      - name: Deploy report to GitHub Pages
        if: always()
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Write run summary
        if: always()
        shell: pwsh
        run: |
          $summary = @(
            "## Cypress Report"
            ""
            "- Branch: `${{ github.ref_name }}`"
            "- Commit: `${{ github.sha }}`"
            "- Spec: `${{ inputs.spec_path }}`"
            "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            "- Report URL: ${{ steps.deploy.outputs.page_url }}"
            "- Debug artifact: `cypress-debug-${{ github.run_number }}`"
            ""
            "Open the report URL to inspect the latest published Mochawesome report."
            "If the run captured screenshots or videos, download the debug artifact from this workflow run."
          ) -join "`n"

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
