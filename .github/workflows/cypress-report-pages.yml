name: Cypress Report
run-name: Cypress Report #${{ github.run_number }} | ${{ inputs.spec_path }}

on:
  workflow_dispatch:
    inputs:
      spec_path:
        description: Cypress spec path to run
        required: true
        default: cypress/e2e/features/common/login.cy.js
        type: string

permissions:
  contents: write

jobs:
  cypress-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress and build Allure report
        id: cypress
        continue-on-error: true
        shell: bash
        env:
          CYPRESS_MAILSLURP_REGISTER_API_KEY: ${{ secrets.MAILSLURP_REGISTER_API_KEY }}
          CYPRESS_MAILSLURP_API_KEY: ${{ secrets.MAILSLURP_API_KEY }}
          CYPRESS_MAILSLURP_TEST_API_KEY: ${{ secrets.MAILSLURP_TEST_API_KEY }}
          CYPRESS_PROXIEDMAIL_API_KEY: ${{ secrets.PROXIEDMAIL_API_KEY }}
          CYPRESS_PROXIEDMAIL_API_BASE: ${{ secrets.PROXIEDMAIL_API_BASE }}
          CYPRESS_ROUNDCUBE_INBOX_URL: ${{ secrets.ROUNDCUBE_INBOX_URL }}
          CYPRESS_ROUNDCUBE_ACCOUNT: ${{ secrets.ROUNDCUBE_ACCOUNT }}
          CYPRESS_ROUNDCUBE_PASSWORD: ${{ secrets.ROUNDCUBE_PASSWORD }}
          CYPRESS_RG006_REGISTER_EMAIL: ${{ secrets.RG006_REGISTER_EMAIL }}
          REPORT_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          REPORT_ATTACH_SCREENSHOTS: failed
        run: npm run report -- --spec "${{ inputs.spec_path }}"

      - name: Prepare gh-pages working tree
        if: always()
        shell: bash
        run: |
          repo_url="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$repo_url" .gh-pages
          else
            mkdir -p .gh-pages
            cd .gh-pages
            git init -b gh-pages
            git remote add origin "$repo_url"
            cd ..
          fi

      - name: Update report history
        id: publish_history
        if: always()
        shell: bash
        env:
          REPORT_SOURCE_DIR: reports/.generated/allure-report
          PAGES_DIR: .gh-pages
          PUBLISH_BRANCH_NAME: ${{ github.ref_name }}
          REPORT_SPEC_PATH: ${{ inputs.spec_path }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "published=false" >> "$GITHUB_OUTPUT"
          if [ -d "reports/.generated/allure-report" ]; then
            node scripts/publish-report-history.js
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "reports/.generated/allure-report not found, skip publish update"
          fi

      - name: Push gh-pages
        if: always()
        shell: bash
        run: |
          if [ ! -d ".gh-pages/.git" ]; then
            echo "gh-pages working tree missing, skip push"
            exit 0
          fi

          cd .gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No report changes to publish"
            exit 0
          fi

          git commit -m "docs: publish cypress report #${{ github.run_number }}"
          git push origin HEAD:gh-pages

      - name: Write run summary
        if: always()
        shell: bash
        env:
          SUMMARY_BRANCH_NAME: ${{ github.ref_name }}
          SUMMARY_SPEC_PATH: ${{ inputs.spec_path }}
          SUMMARY_RUN_NUMBER: ${{ github.run_number }}
          SUMMARY_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          pages_base="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          {
            echo "## Cypress Report"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Spec: \`${{ inputs.spec_path }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ "${{ steps.publish_history.outputs.published }}" = "true" ]; then
              summary_json="$(node <<'NODE'
              const sanitize = (value, fallback = 'item') => {
                const normalized = String(value || '')
                  .trim()
                  .toLowerCase()
                  .replace(/[^a-z0-9._-]+/g, '-')
                  .replace(/-+/g, '-')
                  .replace(/^-|-$/g, '')
                  .slice(0, 80);
                return normalized || fallback;
              };

              const branchSlug = sanitize(process.env.SUMMARY_BRANCH_NAME, 'unknown-branch');
              const specSlug = sanitize(
                String(process.env.SUMMARY_SPEC_PATH || '')
                  .replace(/^cypress[\\/]/i, '')
                  .replace(/[\\/]/g, '-')
                  .replace(/\.(cy|spec)\.[^.]+$/i, '')
                  .replace(/\.[^.]+$/, ''),
                'spec'
              );
              const runNumber = String(process.env.SUMMARY_RUN_NUMBER || '0');
              const runAttempt = Number(process.env.SUMMARY_RUN_ATTEMPT || '1');
              const runLabel =
                runAttempt > 1
                  ? `${runNumber}-attempt-${runAttempt}-${specSlug}`
                  : `${runNumber}-${specSlug}`;

              process.stdout.write(JSON.stringify({ branchSlug, runLabel }));
              NODE
              )"
              branch_slug="$(node -p "JSON.parse(process.argv[1]).branchSlug" "$summary_json")"
              run_label="$(node -p "JSON.parse(process.argv[1]).runLabel" "$summary_json")"
              echo "- Latest report: ${pages_base}/latest/"
              echo "- History index: ${pages_base}/"
              echo "- Run report: ${pages_base}/runs/${branch_slug}/${run_label}/"
            else
              echo "- Report status: not published"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if Cypress failed
        if: steps.cypress.outcome == 'failure'
        shell: bash
        run: exit 1
